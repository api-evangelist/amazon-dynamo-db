apis:
  - aid: amazon-dynamo-db:api
    name: Amazon DynamoDB API
    description: >-
      Low-level HTTPS JSON API for Amazon DynamoDB that supports table
      management, item-level CRUD, queries, scans, transactions, global
      tables, streams, and backup and restore operations. Requests are
      POSTed with the X-Amz-Target header naming the operation and are
      authenticated using AWS Signature Version 4 (SigV4).
    humanURL: https://docs.aws.amazon.com/amazondynamodb/latest/APIReference/Welcome.html
    baseURL: https://dynamodb.us-east-1.amazonaws.com
