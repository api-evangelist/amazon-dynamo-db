aid: amazon-dynamo-db
name: Amazon DynamoDB
description: >-
  Amazon DynamoDB is a fully managed NoSQL key-value and document database
  service from Amazon Web Services that delivers single-digit millisecond
  performance at any scale with built-in security, continuous backups,
  automated multi-region replication, in-memory caching, and data export
  capabilities. DynamoDB exposes a low-level HTTPS JSON API used by the AWS
  SDKs and CLI to perform table management, item CRUD, query, scan,
  transaction, and streams operations, all authenticated with AWS Signature
  Version 4 (SigV4).
type: Index
